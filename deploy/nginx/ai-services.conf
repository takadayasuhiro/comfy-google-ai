# AI サービス共用 nginx 設定（WSL2 / Ubuntu）
# 設置: sudo cp deploy/nginx/ai-services.conf /etc/nginx/sites-available/ai-services
#       sudo ln -sf /etc/nginx/sites-available/ai-services /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx
#
# 他サービスとポート 80 を共有し、URL パスで振り分けます。

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name localhost;

    # 画像生成 UI（comfy-google-ai）
    location = /gazou {
        return 301 /gazou/;
    }

    location /gazou/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Script-Name /gazou;
        proxy_read_timeout 300s;
        client_max_body_size 20M;
    }

    # 機密エージェント LLM 等（例: ポート 9000 のサービス）
    # location /agent/ {
    #     proxy_pass http://127.0.0.1:9000/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    # トップ（未使用時）
    location = / {
        return 302 /gazou/;
    }
}
